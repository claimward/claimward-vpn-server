# Dex configuration for local Claimward development, with YubiKey/FIDO2 WebAuthn
# as a second factor after the password login.
#
# WebAuthn MFA landed upstream in dexidp/dex (PR #4704) but is NOT in a released
# version yet, so run Dex from source/master (see `task dex`), not `pkgx dex`.
# MFA also requires the sessions feature flag: DEX_SESSIONS_ENABLED=true.
#
#   DEX_SESSIONS_ENABLED=true dex serve deploy/dev/dex-config.yaml
#   Issuer:     http://localhost:5556/dex
#   Test users: user@claimward.test / claimward
#               yannick.fitamant@polytechnique.edu / claimward
#   MFA is disabled in dev (see defaultMFAChain below), so password alone works.
#
# Note: the issuer host is "localhost" (not 127.0.0.1) because the WebAuthn RP ID
# must be a domain — IP addresses are rejected by browsers. "localhost" is both a
# valid RP ID and a secure context.
issuer: http://localhost:5556/dex

storage:
  type: memory

web:
  http: 0.0.0.0:5556

oauth2:
  skipApprovalScreen: true

# Required for MFA (with DEX_SESSIONS_ENABLED=true).
sessions:
  cookieName: claimward_dex

staticClients:
  - id: claimward
    name: Claimward
    public: true

enablePasswordDB: true
staticPasswords:
  - email: "user@claimward.test"
    # bcrypt hash of the password "claimward"
    hash: "$2a$10$hADEW0AYJJdjd5rDujkZKOGNpdZ/n/ODm134ovIqE8rQ62.Bv/uJm"
    username: "claimward"
    userID: "00000000-0000-0000-0000-000000000001"
  - email: "yannick.fitamant@polytechnique.edu"
    # bcrypt hash of the password "claimward"
    hash: "$2a$10$hADEW0AYJJdjd5rDujkZKOGNpdZ/n/ODm134ovIqE8rQ62.Bv/uJm"
    username: "yannick.fitamant"
    userID: "00000000-0000-0000-0000-000000000002"

# YubiKey / FIDO2 as a second factor. The authenticator stays defined, but MFA is
# NOT enforced in dev (defaultMFAChain commented out) so test users can sign in
# with a password alone — no YubiKey registration required.
mfa:
  authenticators:
    - id: webauthn
      type: WebAuthn
      connectorTypes: ["local"] # only the built-in password DB
      config:
        rpDisplayName: "Claimward"
        rpID: "localhost"
        rpOrigins: ["http://localhost:5556"]
        # Require an external security key (YubiKey), not a platform authenticator.
        authenticatorAttachment: "cross-platform"
        # Request user verification (PIN/biometric) when the key supports it,
        # without hard-failing keys that don't.
        userVerification: "preferred"
        attestationPreference: "none"
        timeout: "120s"
  # MFA disabled in dev — re-enable by uncommenting to enforce WebAuthn:
  # defaultMFAChain: ["webauthn"]
